name: conformance

# Mechanical merge gate (judgment-free). The reviewer agents are the second layer.

on:
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (packages)
        run: pnpm typecheck
      - name: Typecheck (app .tsx)
        run: pnpm typecheck:app
      - name: Tests (contracts golden + fixtures + domain + e2e)
        run: pnpm test
      - name: App production build (catches bundle breaks tsc misses)
        run: pnpm --filter @liminal-engine/desktop-demo build
      - name: Boundary lint (hexagonal — engine-core stays pure)
        run: pnpm lint:boundaries
      # DIRECTIVE.md: the 14-beat demo flow is REFERENCE, not a gate. Spine-guard
      # still runs for visibility but must NOT block real-product integration work.
      - name: Spine guard (reference — 14 beats · 7 MNC · non-blocking)
        run: node tools/check-spine-guard.mjs || echo "::warning::spine-guard reported drift (non-blocking per DIRECTIVE.md — demo flow is reference, not a gate)"
      - name: Goldens committed & up to date
        run: |
          pnpm regen:goldens
          if ! git diff --quiet -- packages/contracts; then
            echo "::error::Contract goldens are stale — run 'pnpm regen:goldens' and commit (or you changed a contract unintentionally)."
            git --no-pager diff -- packages/contracts
            exit 1
          fi
      # DIRECTIVE.md: the DEMO_CONTRACT conformance matrix is reference, not a gate.
      # Runs for visibility but must not block real-product PRs.
      - name: Conformance matrix (reference — non-blocking)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node tools/check-conformance-matrix.mjs || echo "::warning::no conformance matrix (non-blocking per DIRECTIVE.md)"
      - name: Linear issue ID present
        env:
          BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node tools/check-linear-id.mjs
